  undici: ^8.4.1
  ws: ^8.21.0

catalogs:
  build:
    rollup-plugin-analyzer: ^4.0.0
    rollup-plugin-visualizer: ^7.0.1
    tsdown: 0.18.3
  docs:
    vitepress: 1.6.4
  eslint:
    '@typescript-eslint/eslint-plugin': ^8.61.0
    '@typescript-eslint/parser': ^8.61.0
    eslint: ^10.4.1
    eslint-plugin-vue: ^10.9.2
  node:
    '@types/node': ^25.9.3
  nuxt:
    '@nuxt/content': ^3.14.0
    '@nuxt/image': ^2.0.0
    '@nuxt/ui': ^4.8.2
    nuxt: 4.1.3
  testing:
    '@vitest/coverage-v8': ^4.1.8
    '@vitest/ui': ^4.1.8
    '@vue/test-utils': ^2.4.11
    jsdom: ^29.1.1
    vitest: 3.2.4
  three:
    '@types/three': ^0.184.1
    three: ^0.184.0
    three-custom-shader-material: ^6.4.0
    three-stdlib: ^2.36.1
  typescript:
    typescript: ^6.0.3
    vue-tsc: ^3.3.4
  utils:
    '@vueuse/core': ^14.3.0
    gsap: ^3.15.0
    kolorist: ^1.8.0
    pathe: ^2.0.3
    unocss: ^66.7.0
    unplugin-auto-import: 20.3.0
  vite:
    '@vitejs/plugin-vue': ^6.0.7
    vite: ^8.0.16
    vite-plugin-banner: ^0.8.1
    vite-plugin-dts: 4.5.4
    vite-plugin-glsl: 1.5.5
    vite-plugin-qrcode: 0.3.0
    vite-plugin-vue-devtools: 8.0.5
  vue:
    vue: ^3.5.38
    vue-router: ^5.1.0

allowBuilds:
  '@parcel/watcher': false
  better-sqlite3: true
  edgedriver: false
  esbuild: false
  geckodriver: false
  nx: false
  sharp: false
  unrs-resolver: false
  vue-demi: false
  workerd: false
