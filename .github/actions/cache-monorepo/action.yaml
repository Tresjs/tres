name: Cache Monorepo
description: Cache Nx cache for monorepo workflows (pnpm store is cached by setup-node)
runs:
  using: "composite"
  steps:
    - name: Cache Nx cache
      uses: actions/cache@v4
      with:
        path: .nx/cache
        key: ${{ runner.os }}-nx-cache-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-nx-cache-
