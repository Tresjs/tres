name: Deploy CubeBot

on:
  push:
    branches:
      - main
    paths:
      - 'apps/cubebot/**'
  pull_request:
    branches:
      - main
    paths:
      - 'apps/cubebot/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Workers
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: ./.github/actions/setup-node

      # eslint.config.js imports the built @tresjs/eslint-config
      - name: Build lint config
        run: pnpm --filter @tresjs/eslint-config run build

      - name: Lint
        run: pnpm --filter cubebot run lint

      - name: Typecheck
        run: pnpm --filter cubebot run typecheck

      # Only deploy on push to main, never on pull requests
      - name: Deploy
        if: github.event_name == 'push'
        run: pnpm --filter cubebot run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
